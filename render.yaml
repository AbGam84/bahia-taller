# Despliegue 24/7 en Render — no depende de su PC
# https://dashboard.render.com/blueprints/new?repo=https://github.com/AbGam84/bahia-taller
services:
  - type: web
    name: bahia-taller
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: BAHIA_DATA_DIR
        value: /tmp/bahia-data
      - key: BAHIA_SECRET_KEY
        generateValue: true
      - key: BAHIA_ADMIN_USER
        value: admin
      - key: BAHIA_ADMIN_PASSWORD
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.8"
