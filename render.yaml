services:
  - type: web
    name: bahia-taller
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: bahia-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: BAHIA_DATA_DIR
        value: /data
      - key: BAHIA_SECRET_KEY
        generateValue: true
      - key: BAHIA_ADMIN_USER
        value: admin
      - key: BAHIA_ADMIN_PASSWORD
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.8"
